variables:
  GIT_LFS_SKIP_SMUDGE: "1"
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  PYTHON_EXE: C:\Users\jashwitha\AppData\Local\Programs\Python\Python311\python.exe

before_script:
  - '& "$env:PYTHON_EXE" --version'
  - '& "$env:PYTHON_EXE" -m pip install --upgrade pip'
  - '& "$env:PYTHON_EXE" -m pip install -r requirements.txt'
  - '& "$env:PYTHON_EXE" -m pip install ruff mypy pytest bandit pip-audit'

stages:
  - stage-ruff-lint
  - stage-ruff-format
  - stage-mypy
  - stage-bandit
  - stage-pip-audit
  - stage-license
  - stage-readme
  - stage-contributing
  - stage-changelog
  - stage-security-doc
  - stage-spec
  - stage-unit-tests
  - stage-integration

lint:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m ruff check .'

format:
  stage: format
  script:
    - '& "$env:PYTHON_EXE" -m ruff format --check .'

type_check:
  stage: type_check
  script:
    - '& "$env:PYTHON_EXE" -m mypy ai database ui --ignore-missing-imports'
  allow_failure: true

vulture:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m vulture ai database ui app.py --min-confidence 80'
  allow_failure: true

semgrep:
  stage: security
  script:
    - '& "$env:SEMGREP_EXE" scan --metrics=off --disable-version-check --config .semgrep.yml ai database ui app.py'
  allow_failure: true

bandit-scan:
  stage: security
  script:
    - '& "$env:PYTHON_EXE" -m bandit -r ai database ui app.py -ll'

pip-audit:
  stage: audit
  script:
    - '& "$env:PYTHON_EXE" -m pip_audit -r requirements.txt'
  allow_failure: true

changelog-git-cliff:
  stage: docs
  script:
    - '& git cliff --config .git-cliff.toml --unreleased --strip header'
  allow_failure: true

license-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(chr(76)+chr(73)+chr(67)+chr(69)+chr(78)+chr(83)+chr(69)).exists(); print(chr(79)+chr(75))"'

readme-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''README.md'').exists(); print(''OK'')"'

contributing-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CONTRIBUTING.md'').exists(); print(''OK'')"'

changelog-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CHANGELOG.md'').exists(); print(''OK'')"'

security-doc-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SECURITY.md'').exists(); print(''OK'')"'

spec-check:
  stage: spec
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SPEC.md'').exists(); print(''OK'')"'

coverage:
  stage: coverage
  script:
    - '& "$env:PYTHON_EXE" -m pytest --cov=ai --cov=database --cov-report=term-missing --cov-report=xml'
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test:
  stage: test
  script:
    - '& "$env:PYTHON_EXE" -m pytest -v'

integration-check:
  stage: stage-integration
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''INTEGRATION.md'').exists(); print(''OK'')"'
