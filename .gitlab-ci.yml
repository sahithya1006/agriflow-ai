# CI/CD pipeline for AgriFlow AI

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security
  - audit

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  script:
    - python -m ruff check .
    - python -m flake8 ai database ui tests app.py
    - python -m pylint ai database ui app.py --fail-under=6.0

format:
  stage: format
  script:
    - python -m ruff format --check .
    - python -m pyupgrade --py311-plus app.py ai/*.py database/*.py ui/*.py tests/*.py

type_check:
  stage: type_check
  script:
    - python -m mypy ai database ui --ignore-missing-imports

test:
  stage: test
  script:
    - python -m pytest tests/ -v --tb=short

coverage:
  stage: coverage
  script:
    - python -m pytest --cov=ai --cov=database --cov-report=term-missing --cov-report=xml --cov-fail-under=40
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

bandit:
  stage: security
  script:
    - python -m bandit -r ai database ui app.py -ll

semgrep:
  stage: security
  script:
    - python -m semgrep --config auto --error --metrics=off ai database ui app.py
  allow_failure: true

gitleaks-secret-scan:
  stage: security
  script:
    - python -m detect_secrets scan --all-files --exclude-files '(^\.git/|.*\.pkl$|.*\.db$)' > .secrets.baseline
    - python -m detect_secrets audit .secrets.baseline --report

dependency-audit:
  stage: audit
  script:
    - python -m pip_audit -r requirements.txt
  allow_failure: true

vulture:
  stage: lint
  script:
    - python -m vulture ai database ui app.py --min-confidence 90
  allow_failure: true
