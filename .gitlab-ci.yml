stages:
  - lint
  - format
  - type_check
  - security
  - audit
  - docs
  - spec
  - coverage
  - test

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  PYTHON_EXE: "C:\\Users\\jashwitha\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

before_script:
  - '& "$env:PYTHON_EXE" --version'
  - '& "$env:PYTHON_EXE" -m pip install --upgrade pip'
  - '& "$env:PYTHON_EXE" -m pip install -r requirements.txt'
  - '& "$env:PYTHON_EXE" -m pip install ruff mypy pytest pytest-cov bandit pip-audit flake8 pylint vulture semgrep'

lint:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m ruff check .'

format:
  stage: format
  script:
    - '& "$env:PYTHON_EXE" -m ruff format --check .'

type_check:
  stage: type_check
  script:
    - '& "$env:PYTHON_EXE" -m mypy ai database ui --ignore-missing-imports'
  allow_failure: true

vulture:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m vulture ai database ui app.py --min-confidence 80'
  allow_failure: true

semgrep:
  stage: security
  script:
    - '& semgrep scan --metrics=off --disable-version-check --config .semgrep.yml ai database ui app.py'
  allow_failure: true

bandit-scan:
  stage: security
  script:
    - '& "$env:PYTHON_EXE" -m bandit -r ai database ui app.py -ll'

pip-audit:
  stage: audit
  script:
    - '& "$env:PYTHON_EXE" -m pip_audit -r requirements.txt'
  allow_failure: true

changelog-git-cliff:
  stage: docs
  script:
    - '& git cliff --config .git-cliff.toml --unreleased --strip header'
  allow_failure: true

license-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''LICENSE'').exists(); print(''LICENSE OK'')"'

readme-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''README.md'').exists(); print(''README OK'')"'

contributing-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CONTRIBUTING.md'').exists(); print(''CONTRIBUTING OK'')"'

changelog-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CHANGELOG.md'').exists(); print(''CHANGELOG OK'')"'

security-doc-check:
  stage: docs
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SECURITY.md'').exists(); print(''SECURITY OK'')"'

spec-check:
  stage: spec
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; required = [''.specify/memory/constitution.md'', ''.specify/templates/spec-template.md'', ''.specify/templates/plan-template.md'', ''.specify/templates/tasks-template.md'', ''specs/offline-crop-guidance/spec.md'', ''specs/offline-crop-guidance/plan.md'', ''specs/offline-crop-guidance/tasks.md'']; missing = [p for p in required if not pathlib.Path(p).exists()]; assert not missing, missing; print(''SPEC KIT OK'')"'

coverage:
  stage: coverage
  script:
    - '& "$env:PYTHON_EXE" -m pytest --cov=ai --cov=database --cov-report=term-missing --cov-report=xml'
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test:
  stage: test
  script:
    - '& "$env:PYTHON_EXE" -m pytest -v'
