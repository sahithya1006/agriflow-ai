# .gitlab-ci.yml
# CI/CD pipeline for AgriFlow AI
# Every job is a separate individual check
# All 12 checks run independently

stages:
  - lint
  - security
  - audit
  - test

default:
  image: python:3.11-slim
  before_script:
    - pip install ruff mypy bandit pip-audit pytest pandas pydantic scikit-learn pillow joblib

# ── LINT STAGE ──────────────────────────────

# Check 1 — Ruff lint
ruff-lint:
  stage: lint
  script:
    - ruff check .
  allow_failure: false

# Check 2 — Ruff format
ruff-format:
  stage: lint
  script:
    - ruff format --check .
  allow_failure: false

# Check 3 — MyPy type check
mypy-check:
  stage: lint
  script:
    - mypy ui/ database/ --ignore-missing-imports
  allow_failure: false

# ── SECURITY STAGE ──────────────────────────

# Check 4 — Bandit security scan
bandit-scan:
  stage: security
  script:
    - bandit -r . -ll --exclude .venv,tests
  allow_failure: false

# Check 5 — pip-audit vulnerability check
pip-audit:
  stage: security
  script:
    - pip-audit
  allow_failure: false

# ── AUDIT STAGE ─────────────────────────────

# Check 6 — LICENSE file exists
license-check:
  stage: audit
  script:
    - test -f LICENSE && echo "LICENSE found" || exit 1
  allow_failure: false

# Check 7 — README file exists
readme-check:
  stage: audit
  script:
    - test -f README.md && echo "README found" || exit 1
  allow_failure: false

# Check 8 — CONTRIBUTING file exists
contributing-check:
  stage: audit
  script:
    - test -f CONTRIBUTING.md && echo "CONTRIBUTING found" || exit 1
  allow_failure: false

# Check 9 — CHANGELOG file exists
changelog-check:
  stage: audit
  script:
    - test -f CHANGELOG.md && echo "CHANGELOG found" || exit 1
  allow_failure: false

# Check 10 — SECURITY file exists
security-doc-check:
  stage: audit
  script:
    - test -f SECURITY.md && echo "SECURITY found" || exit 1
  allow_failure: false

# Check 11 — SPEC file exists
spec-check:
  stage: audit
  script:
    - test -f SPEC.md && echo "SPEC found" || exit 1
  allow_failure: false

# ── TEST STAGE ──────────────────────────────

# Check 12 — Run unit tests
unit-tests:
  stage: test
  script:
    - pip install pytest
    - pytest tests/ -v --tb=short
  allow_failure: false