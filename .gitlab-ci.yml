stages:
  - lint
  - security
  - audit
  - test

variables:
  PYTHON_EXE: "C:\\Users\\jashwitha\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

ruff-lint:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m pip install ruff --quiet'
    - '& "$env:PYTHON_EXE" -m ruff check .'

ruff-format:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m pip install ruff --quiet'
    - '& "$env:PYTHON_EXE" -m ruff format --check .'

bandit-scan:
  stage: security
  script:
    - '& "$env:PYTHON_EXE" -m pip install bandit --quiet'
    - '& "$env:PYTHON_EXE" -m bandit -r ai -ll'

pip-audit:
  stage: security
  script:
    - '& "$env:PYTHON_EXE" -m pip install pip-audit --quiet'
    - '& "$env:PYTHON_EXE" -m pip_audit'
  allow_failure: true

license-check:
  stage: audit
  script:
    - '& "$env:PYTHON_EXE" -c "import os; assert os.path.isfile(''LICENSE''), ''LICENSE missing''; print(''LICENSE found'')"'

readme-check:
  stage: audit
  script:
    - '& "$env:PYTHON_EXE" -c "import os; assert os.path.isfile(''README.md''), ''README missing''; print(''README found'')"'

spec-check:
  stage: audit
  script:
    - '& "$env:PYTHON_EXE" -c "import os; assert os.path.isfile(''SPEC.md''), ''SPEC missing''; print(''SPEC found'')"'

unit-tests:
  stage: test
  script:
    - '& "$env:PYTHON_EXE" -m pip install pytest pandas scikit-learn pillow joblib pydantic pytesseract --quiet'
    - '& "$env:PYTHON_EXE" -m pytest tests/ -v --tb=short'
    