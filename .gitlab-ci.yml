stages:
  - stage-ruff-lint
  - stage-ruff-format
  - stage-mypy
  - stage-bandit
  - stage-pip-audit
  - stage-license
  - stage-readme
  - stage-contributing
  - stage-changelog
  - stage-security-doc
  - stage-spec
  - stage-unit-tests
  - stage-integration

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  PYTHON_EXE: "C:\\Users\\jashwitha\\AppData\\Local\\Programs\\Python\\Python311\\python.exe"

before_script:
  - '& "$env:PYTHON_EXE" --version'
  - '& "$env:PYTHON_EXE" -m pip install --upgrade pip'
  - '& "$env:PYTHON_EXE" -m pip install -r requirements.txt'
  - '& "$env:PYTHON_EXE" -m pip install ruff mypy pytest pytest-cov bandit pip-audit flake8 pylint vulture semgrep'

ruff-lint:
  stage: stage-ruff-lint
  script:
    - '& "$env:PYTHON_EXE" -m ruff check .'

ruff-format:
  stage: stage-ruff-format
  script:
    - '& "$env:PYTHON_EXE" -m ruff format --check .'

mypy-check:
  stage: stage-mypy
  script:
    - '& "$env:PYTHON_EXE" -m mypy ai database ui --ignore-missing-imports'
  allow_failure: true

bandit-scan:
  stage: stage-bandit
  script:
    - '& "$env:PYTHON_EXE" -m bandit -r ai database ui app.py -ll'

pip-audit:
  stage: stage-pip-audit
  script:
    - '& "$env:PYTHON_EXE" -m pip_audit -r requirements.txt'
  allow_failure: true

license-check:
  stage: stage-license
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''LICENSE'').exists(); print(''LICENSE OK'')"'

readme-check:
  stage: stage-readme
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''README.md'').exists(); print(''README OK'')"'

contributing-check:
  stage: stage-contributing
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CONTRIBUTING.md'').exists(); print(''CONTRIBUTING OK'')"'

changelog-check:
  stage: stage-changelog
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CHANGELOG.md'').exists(); print(''CHANGELOG OK'')"'

security-doc-check:
  stage: stage-security-doc
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SECURITY.md'').exists(); print(''SECURITY OK'')"'

spec-check:
  stage: stage-spec
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SPEC.md'').exists(); print(''SPEC OK'')"'

unit-tests:
  stage: stage-unit-tests
  script:
    - '& "$env:PYTHON_EXE" -m pytest -v'

integration-check:
  stage: stage-integration
  script:
    - '& "$env:PYTHON_EXE" -m pytest tests/ -v'