# .gitlab-ci.yml
# CI/CD pipeline for AgriFlow AI
# 12 individual checks — Windows shell runner

stages:
  - checks

variables:
  PYTHON: "C:\\Users\\sahit\\AppData\\Local\\Programs\\Python\\Python312\\python.exe"

# Check 1 — Ruff lint
ruff-lint:
  stage: checks
  script:
    - '$env:PYTHON -m pip install ruff --quiet'
    - '$env:PYTHON -m ruff check .'
  allow_failure: false

# Check 2 — Ruff format
ruff-format:
  stage: checks
  script:
    - '$env:PYTHON -m pip install ruff --quiet'
    - '$env:PYTHON -m ruff format --check .'
  allow_failure: false

# Check 3 — MyPy type check
mypy-check:
  stage: checks
  script:
    - '$env:PYTHON -m pip install mypy --quiet'
    - '$env:PYTHON -m mypy ui/ database/ --ignore-missing-imports'
  allow_failure: true

# Check 4 — Bandit security scan
bandit-scan:
  stage: checks
  script:
    - '$env:PYTHON -m pip install bandit --quiet'
    - '$env:PYTHON -m bandit -r . -ll --exclude .venv,tests'
  allow_failure: false

# Check 5 — pip-audit vulnerability check
pip-audit:
  stage: checks
  script:
    - '$env:PYTHON -m pip install pip-audit --quiet'
    - '$env:PYTHON -m pip_audit'
  allow_failure: true

# Check 6 — LICENSE file exists
license-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''LICENSE''), ''LICENSE missing''; print(''LICENSE found'')"'
  allow_failure: false

# Check 7 — README file exists
readme-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''README.md''), ''README.md missing''; print(''README found'')"'
  allow_failure: false

# Check 8 — CONTRIBUTING file exists
contributing-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''CONTRIBUTING.md''), ''CONTRIBUTING.md missing''; print(''CONTRIBUTING found'')"'
  allow_failure: false

# Check 9 — CHANGELOG file exists
changelog-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''CHANGELOG.md''), ''CHANGELOG.md missing''; print(''CHANGELOG found'')"'
  allow_failure: false

# Check 10 — SECURITY file exists
security-doc-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''SECURITY.md''), ''SECURITY.md missing''; print(''SECURITY found'')"'
  allow_failure: false

# Check 11 — SPEC file exists
spec-check:
  stage: checks
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''SPEC.md''), ''SPEC.md missing''; print(''SPEC found'')"'
  allow_failure: false

# Check 12 — Run unit tests
unit-tests:
  stage: checks
  script:
    - '$env:PYTHON -m pip install pytest pandas scikit-learn pillow joblib --quiet'
    - '$env:PYTHON -m pytest tests/ -v --tb=short'
  allow_failure: false
