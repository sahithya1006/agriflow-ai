# .gitlab-ci.yml
# CI/CD pipeline for AgriFlow AI
# 13 stages — 13 circles — 1 job each

stages:
  - stage-ruff-lint
  - stage-ruff-format
  - stage-mypy
  - stage-bandit
  - stage-pip-audit
  - stage-license
  - stage-readme
  - stage-contributing
  - stage-changelog
  - stage-security-doc
  - stage-spec
  - stage-unit-tests
  - stage-integration

# Check 1 — Ruff lint
ruff-lint:
  stage: stage-ruff-lint
  script:
    - '& "$env:PYTHON_EXE" -m ruff check .'

# Check 2 — Ruff format
ruff-format:
  stage: stage-ruff-format
  script:
    - '& "$env:PYTHON_EXE" -m ruff format --check .'

# Check 3 — MyPy type check
mypy-check:
  stage: stage-mypy
  script:
    - '& "$env:PYTHON_EXE" -m mypy ai database ui --ignore-missing-imports'
  allow_failure: true

# Check 4 — Bandit security scan
bandit-scan:
  stage: stage-bandit
  script:
    - '& "$env:PYTHON_EXE" -m pytest tests/ -v --tb=short'

coverage-check:
  stage: coverage
  script:
    - '& "$env:PYTHON_EXE" -m pytest --cov=ai --cov=database --cov-report=term-missing --cov-fail-under=40'

bandit-scan:
  stage: security
  script:
    - '& "$env:PYTHON_EXE" -m bandit -r ai database ui app.py -ll'

# Check 5 — pip-audit vulnerability check
pip-audit:
  stage: stage-pip-audit
  script:
    - '& "$env:PYTHON_EXE" -m pip_audit -r requirements.txt'
  allow_failure: true

flake8-check:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m flake8 ai database ui tests app.py'

pylint-check:
  stage: lint
  script:
    - '& "$env:PYTHON_EXE" -m pylint ai database ui app.py --fail-under=6.0'
  allow_failure: true

# Check 6 — LICENSE file exists
license-check:
  stage: stage-license
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''LICENSE'').exists(); print(''LICENSE OK'')"'

# Check 7 — README file exists
readme-check:
  stage: stage-readme
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''README.md'').exists(); print(''README OK'')"'

# Check 8 — CONTRIBUTING file exists
contributing-check:
  stage: stage-contributing
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CONTRIBUTING.md'').exists(); print(''CONTRIBUTING OK'')"'

# Check 9 — CHANGELOG file exists
changelog-check:
  stage: stage-changelog
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''CHANGELOG.md'').exists(); print(''CHANGELOG OK'')"'

# Check 10 — SECURITY file exists
security-doc-check:
  stage: stage-security-doc
  script:
    - '& "$env:PYTHON_EXE" -c "import pathlib; assert pathlib.Path(''SECURITY.md'').exists(); print(''SECURITY OK'')"'

# Check 11 — SPEC file exists
spec-check:
  stage: stage-spec
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''SPEC.md''), ''SPEC.md missing''; print(''SPEC found'')"'
  allow_failure: false

# Check 12 — Run unit tests
unit-tests:
  stage: stage-unit-tests
  script:
    - '$env:PYTHON -m pip install pytest pandas scikit-learn pillow joblib --quiet'
    - '$env:PYTHON -m pytest tests/ -v --tb=short'
  allow_failure: false

# Check 13 — INTEGRATION.md exists
integration-check:
  stage: stage-integration
  script:
    - '$env:PYTHON -c "import os; assert os.path.isfile(''INTEGRATION.md''), ''INTEGRATION.md missing''; print(''INTEGRATION found'')"'
  allow_failure: false
