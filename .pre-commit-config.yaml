# .pre-commit-config.yaml
# These hooks run automatically before every git commit
# They check code quality before anything is pushed to GitLab

repos:
  # Ruff — fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Bandit — security scanner
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-r, ., -ll]