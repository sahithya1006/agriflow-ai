[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_configs = true

[tool.coverage.run]
source = ["ai", "database"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 40
show_missing = true

[tool.vulture]
paths = ["ai", "database", "ui", "app.py"]
min_confidence = 80
sort_by_size = true

[tool.bandit]
exclude_dirs = ["tests", ".venv"]

[tool.pylint.main]
ignore = [".venv", ".git"]

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring",
  "invalid-name",
  "import-error",
  "redefined-outer-name",
  "too-many-arguments",
  "too-many-positional-arguments",
  "exec-used",
  "consider-using-with",
  "duplicate-code",
  "broad-exception-caught",
]

[tool.pylint.format]
max-line-length = 88
